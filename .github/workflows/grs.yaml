name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-readme-stats cards
        run: |
          set -euo pipefail

          mkdir -p dist

          base_url="https://github-readme-stats.vercel.app/api"
          owner="${{ github.repository_owner }}"

          curl -L "${base_url}?username=${owner}&show_icons=true&theme=transparent" -o dist/github-stats.svg
          curl -L "${base_url}/top-langs/?username=${owner}&layout=compact&langs_count=8&theme=transparent&hide=css,html,scss,jupyter%20notebook,tex" -o dist/top-langs.svg
          curl -L "${base_url}/pin/?username=${owner}&repo=MatteoCalvanico&theme=transparent" -o dist/pinned-repo.svg

      - name: Push cards to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}